---
- name: Test user
  hosts: ipaserver
  become: true
  gather_facts: false

  tasks:
  - name: Remove test users
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: manager1,manager2,manager3,pinky,pinky2
      state: absent

  - name: Generate public and private key.
    shell:
      cmd: |
        set -o pipefail
        ssh-keygen -t rsa -b 2040 -P "PinkyPassphrase01" -f pinky_key_1
        ssh-keygen -t rsa -b 2040 -P "PinkyPassphrase01" -f pinky_key_2
    delegate_to: localhost
    become: no

  - name: User manager1 present
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: manager1
      first: Manager
      last: One
    register: result
    failed_when: not result.changed

  - name: User manager2 present
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: manager2
      first: Manager
      last: One
    register: result
    failed_when: not result.changed

  - name: User manager3 present
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: manager3
      first: Manager
      last: One
    register: result
    failed_when: not result.changed

  - name: User pinky present
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      uid: 10001
      gid: 100
      phone: "+555123457"
      email: pinky@acme.com
      principalexpiration: "20220119235959"
      #passwordexpiration: "2022-01-19 23:59:59"
      first: pinky
      last: Acme
      initials: pa
      #password: foo2
      principal: pa
      random: yes
      city: PinkyCity
      userstate: PinkyState
      postalcode: PinkyZip
      mobile: "+555123458,+555123459"
      pager: "+555123450,+555123451"
      fax: "+555123452,+555123453"
      orgunit: PinkyOrgUnit
      manager: manager1,manager2
      update_password: on_create
      carlicense: PinkyCarLicense1,PinkyCarLicense2
      # sshpubkey
      userauthtype: password,radius,otp
      userclass: PinkyUserClass
      #radius: "http://some.link/"
      #radiususer: PinkyRadiusUser
      departmentnumber: "1234"
      employeenumber: "0815"
      employeetype: "PinkyExmployeeType"
      preferredlanguage: "en"
      # certificate
      noprivate: yes
      nomembers: false
      #issuer: PinkyIssuer
      #subject: PinkySubject
    register: result
    failed_when: not result.changed

  - name: User pinky present with changed settings
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      first: pinky
      last: Acme
      manager: []
      principal: []
      sshpubkey:
      - "{{ lookup('file', 'pinky_key_1.pub', rstrip=False ) }}"
      - "{{ lookup('file', 'pinky_key_2.pub', rstrip=False ) }}"
    register: result
    failed_when: not result.changed

  - name: User pinky add manager manager1
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      manager: manager1
      action: member
    register: result
    failed_when: not result.changed

  - name: User pinky add manager manager1 again
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      manager: manager1
      action: member
    register: result
    failed_when: result.changed

  - name: User pinky add manager manager2, manager3
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      manager: manager2,manager3
      action: member
    register: result
    failed_when: not result.changed

  - name: User pinky add manager manager2, manager3 again
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      manager: manager2,manager3
      action: member
    register: result
    failed_when: result.changed

  - name: User pinky remove manager manager1
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      manager: manager1
      action: member
      state: absent
    register: result
    failed_when: not result.changed

  - name: User pinky remove manager manager1 again
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      manager: manager1
      action: member
      state: absent
    register: result
    failed_when: result.changed

  - name: User pinky add principal pa
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      principal: pa
      action: member
    register: result
    failed_when: not result.changed

  - name: User pinky add principal pa again
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      principal: pa
      action: member
    register: result
    failed_when: result.changed

  - name: User pinky add principal pa1
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      principal: pa1
      action: member
    register: result
    failed_when: not result.changed

  - name: User pinky remove principal pa1
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      principal: pa1
      action: member
      state: absent
    register: result
    failed_when: not result.changed

  - name: User pinky remove principal pa1 again
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      principal: pa1
      action: member
      state: absent
    register: result
    failed_when: result.changed

  - name: User pinky remove principal pa
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      principal: pa
      action: member
      state: absent
    register: result
    failed_when: not result.changed

  - name: User pinky remove principal non-existing pa2
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      principal: pa2
      action: member
      state: absent
    register: result
    failed_when: result.changed

  - name: User pinky absent and preserved
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      preserve: yes
      state: absent
    register: result
    failed_when: not result.changed

  - name: User pinky undeleted (preserved before)
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      state: undeleted
    register: result
    failed_when: not result.changed

  - name: Users pinky disabled
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      state: disabled
    register: result
    failed_when: not result.changed

  - name: User pinky enabled
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: pinky
      state: enabled
    register: result
    failed_when: not result.changed

  - name: Remove test users
    ipauser:
      ipaadmin_password: SomeADMINpassword
      name: manager1,manager2,manager3,pinky,pinky2
      state: absent

  - name: Remove public and private key files.
    file:
      name: "{{ item }}"
      state: absent
    delegate_to: localhost
    become: no
    with_items:
      - pinky_key_1
      - pinky_key_1.pub
      - pinky_key_2
      - pinky_key_2.pub
